<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <i class="bi bi-bank2"></i>
    </div>
    <div class="logo-text">
      <span class="brand">DigitalBank</span>
      <span class="tagline">Pro</span>
    </div>
  </div>

  <!-- Nav Links -->
  <nav class="sidebar-nav">
    <p class="nav-section-label">MENU PRINCIPAL</p>

    <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
      <i class="bi bi-grid-1x2-fill"></i>
      <span>Dashboard</span>
    </a>

    <a routerLink="/customers" routerLinkActive="active" class="nav-link">
      <i class="bi bi-people-fill"></i>
      <span>Clients</span>
    </a>

    <a routerLink="/accounts" routerLinkActive="active" class="nav-link">
      <i class="bi bi-credit-card-2-front-fill"></i>
      <span>Comptes</span>
    </a>

    <p class="nav-section-label mt-3">ADMINISTRATION</p>

    <a routerLink="/admin/users" routerLinkActive="active" class="nav-link" *ngIf="isAdmin">
      <i class="bi bi-shield-lock-fill"></i>
      <span>Utilisateurs</span>
    </a>
  </nav>

  <!-- ══ CHATBOT SECTION ══════════════════════════════════ -->
  <p class="nav-section-label mt-3">ASSISTANT IA</p>

  <a routerLink="/chatbot"
     routerLinkActive="active"
     class="nav-link">
    <i class="bi bi-robot"></i>
    <span>Assistant IA</span>
  </a>
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- User section -->
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar">
        {{ username.charAt(0).toUpperCase() }}
      </div>
      <div class="user-info">
        <p class="user-name">{{ username }}</p>
        <p class="user-role">{{ isAdmin ? 'Administrateur' : 'Utilisateur' }}</p>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()" title="Déconnexion">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</aside>
